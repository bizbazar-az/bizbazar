<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BizBazar.az — Mesajlar</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
  <script>(function(){if(localStorage.getItem('bb_darkmode')==='1')document.documentElement.setAttribute('data-theme','dark')})()</script>
  <style>
    .msg-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: calc(100vh - var(--header-height));
      overflow: hidden;
    }
    @media(max-width: 768px) {
      .msg-layout { grid-template-columns: 1fr; }
      .msg-sidebar { display: block; }
      .msg-chat-pane { display: none; }
      .msg-layout.chat-open .msg-sidebar { display: none; }
      .msg-layout.chat-open .msg-chat-pane { display: flex; }
    }

    /* ── Sidebar ── */
    .msg-sidebar {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }
    .msg-sidebar-head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: 16px;
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .conv-list {
      flex: 1;
      overflow-y: auto;
    }
    .conv-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      cursor: pointer;
      border-bottom: 1px solid var(--border-light);
      transition: background .15s;
    }
    .conv-item:hover { background: var(--bg-soft); }
    .conv-item.active { background: var(--primary-muted); }
    .conv-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 15px;
      flex-shrink: 0;
    }
    .conv-meta { flex: 1; min-width: 0; }
    .conv-title {
      font-weight: 600;
      font-size: 14px;
      color: var(--primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .conv-last {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .conv-time {
      font-size: 11px;
      color: var(--text-light);
      flex-shrink: 0;
    }
    .conv-empty {
      padding: 60px 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
    }
    .conv-empty svg { margin: 0 auto 16px; display: block; opacity: .35; }

    /* ── Chat pane ── */
    .msg-chat-pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-soft);
    }
    .chat-header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-back-btn {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--primary);
    }
    @media(max-width:768px) { .chat-back-btn { display: flex; } }
    .chat-header-info { flex: 1; min-width: 0; }
    .chat-header-title {
      font-weight: 700;
      font-size: 15px;
      color: var(--primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-header-sub {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg-bubble {
      max-width: 68%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }
    .msg-bubble.mine {
      background: var(--primary);
      color: white;
      border-bottom-right-radius: 4px;
      align-self: flex-end;
    }
    .msg-bubble.theirs {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      align-self: flex-start;
    }
    .msg-time {
      font-size: 10px;
      margin-top: 4px;
      text-align: right;
    }
    .msg-bubble.mine .msg-time { color: rgba(255,255,255,.55); }
    .msg-bubble.theirs .msg-time { color: var(--text-light); }
    .chat-input-row {
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .chat-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      background: var(--bg-soft);
      color: var(--text);
      max-height: 120px;
      transition: border-color .2s;
    }
    .chat-input:focus { outline: none; border-color: var(--primary); }
    .chat-send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--primary);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .2s;
    }
    .chat-send-btn:hover { background: var(--primary-light); }
    .chat-send-btn:disabled { opacity: .4; cursor: not-allowed; }
    .chat-send-btn svg { color: white; }
    .chat-empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
    }
    .chat-empty-state svg { margin-bottom: 16px; opacity: .3; }
    .chat-empty-state p { font-size: 15px; color: var(--text-muted); }
    .msg-date-sep {
      text-align: center;
      font-size: 11px;
      color: var(--text-light);
      margin: 8px 0;
      position: relative;
    }
    .msg-date-sep::before, .msg-date-sep::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 30%;
      height: 1px;
      background: var(--border);
    }
    .msg-date-sep::before { left: 0; }
    .msg-date-sep::after { right: 0; }
  </style>
</head>
<body>
<div id="header-mount"></div>

<div id="auth-guard" style="display:none;padding:80px 0;text-align:center;color:var(--text-muted)">
  <p id="auth-guard-msg" style="margin-bottom:16px">Bu səhifəyə daxil olmaq üçün hesabınıza giriş edin.</p>
  <a href="auth.html?returnTo=messages.html" class="btn btn-primary" id="auth-guard-btn">Daxil ol</a>
</div>

<div id="messages-main" style="display:none">
  <div class="msg-layout" id="msg-layout">
    <!-- Sidebar -->
    <div class="msg-sidebar">
      <div class="msg-sidebar-head">
        <span id="msgs-title">Mesajlar</span>
      </div>
      <div class="conv-list" id="conv-list">
        <div class="conv-empty" id="conv-empty" style="display:none">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <p id="empty-msg">Hələlik mesaj yoxdur</p>
        </div>
      </div>
    </div>

    <!-- Chat pane -->
    <div class="msg-chat-pane" id="chat-pane">
      <div id="chat-empty-state" class="chat-empty-state">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <p id="select-chat-msg">Söhbət seçin</p>
      </div>

      <div id="chat-active" style="display:none;flex-direction:column;height:100%">
        <div class="chat-header">
          <button class="chat-back-btn" onclick="closeMobileChat()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div class="chat-header-info">
            <div class="chat-header-title" id="chat-title">—</div>
            <div class="chat-header-sub" id="chat-sub"></div>
          </div>
          <a id="chat-listing-link" href="#" class="btn btn-sm btn-outline" style="font-size:12px;padding:6px 12px" id="view-listing-btn">Elana bax</a>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-row">
          <textarea
            class="chat-input"
            id="chat-input"
            rows="1"
            placeholder="Mesaj yazın..."
            onkeydown="handleInputKey(event)"
            oninput="autoResize(this)"
          ></textarea>
          <button class="chat-send-btn" onclick="handleSend()" id="send-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="footer-mount"></div>
<script src="js/app.js"></script>
<script type="module">
  import {
    auth, onAuthStateChanged,
    listenConversations, listenMessages, sendMessage,
    getProfile
  } from "./js/firebase.js?v=2";

  mountLayout("messages");

  const TX = {
    az: {
      title: "Mesajlar", empty: "Hələlik mesaj yoxdur",
      select_chat: "Söhbət seçin", view_listing: "Elana bax",
      placeholder: "Mesaj yazın...", auth_msg: "Bu səhifəyə daxil olmaq üçün hesabınıza giriş edin.",
      auth_btn: "Daxil ol", yesterday: "dünən", doc_title: "Mesajlar — BizBazar.az"
    },
    en: {
      title: "Messages", empty: "No messages yet",
      select_chat: "Select a conversation", view_listing: "View listing",
      placeholder: "Type a message...", auth_msg: "Sign in to access your messages.",
      auth_btn: "Sign in", yesterday: "yesterday", doc_title: "Messages — BizBazar.az"
    },
    ru: {
      title: "Сообщения", empty: "Пока нет сообщений",
      select_chat: "Выберите беседу", view_listing: "Смотреть объявление",
      placeholder: "Написать сообщение...", auth_msg: "Войдите в аккаунт, чтобы читать сообщения.",
      auth_btn: "Войти", yesterday: "вчера", doc_title: "Сообщения — BizBazar.az"
    }
  };
  function tx(key) {
    const lang = localStorage.getItem("bb_lang") || "az";
    return (TX[lang] && TX[lang][key]) || TX.az[key] || key;
  }
  function applyMsgTX() {
    document.getElementById("msgs-title").textContent       = tx("title");
    document.getElementById("empty-msg").textContent        = tx("empty");
    document.getElementById("select-chat-msg").textContent  = tx("select_chat");
    document.getElementById("chat-listing-link").textContent = tx("view_listing");
    document.getElementById("chat-input").placeholder       = tx("placeholder");
    document.getElementById("auth-guard-msg").textContent   = tx("auth_msg");
    document.getElementById("auth-guard-btn").textContent   = tx("auth_btn");
    document.title = tx("doc_title");
  }
  applyMsgTX();
  window.addEventListener("langchange", applyMsgTX);

  let currentUser = null;
  let activeConvId = null;
  let unsubMessages = null;
  let convData = {};
  let userProfiles = {};

  async function fetchProfile(uid) {
    if (!userProfiles[uid]) {
      userProfiles[uid] = await getProfile(uid) || {};
    }
    return userProfiles[uid];
  }

  function getInitials(name) {
    if (!name) return "?";
    return name.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
  }

  function fmtTime(ts) {
    if (!ts) return "";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }
  function fmtConvTime(ts) {
    if (!ts) return "";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const now = new Date();
    const diffMs = now - d;
    const diffDays = Math.floor(diffMs / 86400000);
    if (diffDays === 0) return fmtTime(ts);
    if (diffDays === 1) return tx("yesterday");
    return d.toLocaleDateString([], { day: "2-digit", month: "short" });
  }

  onAuthStateChanged(auth, async user => {
    applyMsgTX();
    if (!user) {
      document.getElementById("auth-guard").style.display = "block";
      return;
    }
    currentUser = user;
    document.getElementById("messages-main").style.display = "block";

    // Check URL param ?conv=
    const convParam = new URLSearchParams(location.search).get("conv");

    listenConversations(user.uid, async convs => {
      convData = {};
      convs.forEach(c => convData[c.id] = c);

      const list = document.getElementById("conv-list");
      const emptyEl = document.getElementById("conv-empty");

      if (!convs.length) {
        emptyEl.style.display = "block";
        return;
      }
      emptyEl.style.display = "none";

      // Build conversation items
      const items = await Promise.all(convs.map(async conv => {
        const otherUid = conv.participants.find(p => p !== user.uid);
        const otherProfile = otherUid ? await fetchProfile(otherUid) : {};
        const otherName = otherProfile.displayName || otherUid || "?";
        return { conv, otherName, otherProfile };
      }));

      list.innerHTML = items.map(({ conv, otherName }) => `
        <div class="conv-item ${conv.id === activeConvId ? 'active' : ''}"
             onclick="openConv('${conv.id}')"
             id="conv-item-${conv.id}">
          <div class="conv-avatar" style="background:${conv.id.slice(0,6)}">${getInitials(otherName)}</div>
          <div class="conv-meta">
            <div class="conv-title">${escHtml(conv.listingTitle || "Biznes")}</div>
            <div class="conv-last">${escHtml(otherName)} · ${escHtml(conv.lastMessage || "")}</div>
          </div>
          <div class="conv-time">${fmtConvTime(conv.lastMessageAt)}</div>
        </div>
      `).join("");

      // Auto-open from URL param
      if (convParam && convData[convParam] && !activeConvId) {
        openConv(convParam);
      }
    });
  });

  window.openConv = function(convId) {
    if (unsubMessages) unsubMessages();
    activeConvId = convId;

    // mark sidebar item active
    document.querySelectorAll(".conv-item").forEach(el => el.classList.remove("active"));
    const item = document.getElementById("conv-item-" + convId);
    if (item) item.classList.add("active");

    const conv = convData[convId];
    document.getElementById("chat-empty-state").style.display = "none";
    const chatActive = document.getElementById("chat-active");
    chatActive.style.display = "flex";

    document.getElementById("chat-title").textContent  = conv?.listingTitle || "Biznes";
    document.getElementById("chat-sub").textContent    = conv?.participants?.filter(p => p !== currentUser?.uid).join(", ") || "";
    const link = document.getElementById("chat-listing-link");
    if (conv?.listingId) link.href = "listing.html?id=" + conv.listingId;

    // mobile
    document.getElementById("msg-layout").classList.add("chat-open");

    // subscribe to messages
    const messagesEl = document.getElementById("chat-messages");
    unsubMessages = listenMessages(convId, msgs => {
      messagesEl.innerHTML = msgs.map((m, i) => {
        const mine = m.senderId === currentUser?.uid;
        const showDate = i === 0 || !sameDay(msgs[i-1]?.createdAt, m.createdAt);
        const dateHtml = showDate ? `<div class="msg-date-sep">${fmtDateSep(m.createdAt)}</div>` : "";
        return `
          ${dateHtml}
          <div class="msg-bubble ${mine ? 'mine' : 'theirs'}">
            ${escHtml(m.text)}
            <div class="msg-time">${fmtTime(m.createdAt)}</div>
          </div>
        `;
      }).join("");
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });
  };

  window.closeMobileChat = function() {
    document.getElementById("msg-layout").classList.remove("chat-open");
    activeConvId = null;
    if (unsubMessages) unsubMessages();
  };

  window.handleSend = async function() {
    const inp = document.getElementById("chat-input");
    const text = inp.value.trim();
    if (!text || !activeConvId || !currentUser) return;
    inp.value = "";
    inp.style.height = "";
    document.getElementById("send-btn").disabled = true;
    try {
      await sendMessage(activeConvId, currentUser.uid, text);
    } finally {
      document.getElementById("send-btn").disabled = false;
    }
  };

  window.handleInputKey = function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  };

  window.autoResize = function(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 120) + "px";
  };

  function sameDay(ts1, ts2) {
    if (!ts1 || !ts2) return false;
    const d1 = ts1.toDate ? ts1.toDate() : new Date(ts1);
    const d2 = ts2.toDate ? ts2.toDate() : new Date(ts2);
    return d1.toDateString() === d2.toDateString();
  }
  function fmtDateSep(ts) {
    if (!ts) return "";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString([], { day: "2-digit", month: "long", year: "numeric" });
  }
  function escHtml(s) {
    if (!s) return "";
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
</script>
</body>
</ht
